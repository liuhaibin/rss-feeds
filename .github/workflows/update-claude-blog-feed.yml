name: Update Claude Blog RSS Feed

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: >
          Number of listing pages to scrape.
          Use a higher value (e.g. 5) for the initial seed run.
        required: false
        default: '1'

jobs:
  update-feed:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages || '1' }}
        run: python scraper/scrape.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/claude-blog.xml state/seen.json
          git diff --staged --quiet || (
            git commit -m "chore: update Claude Blog RSS feed [skip ci]" &&
            git push
          )
