name: Update RSS Feeds

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: >
          Number of listing pages to scrape per feed.
          Use a higher value (e.g. 5) for a full backfill run.
        required: false
        default: '1'

jobs:
  update-feed:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        config:
          - configs/claude-blog.json
          - configs/anthropic-engineering.json
      # Run feeds sequentially to avoid git push conflicts
      max-parallel: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Always pull latest so sequential jobs don't overwrite each other's commits
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages || '1' }}
        run: python scraper/scrape.py --config ${{ matrix.config }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/ state/
          git diff --staged --quiet || (
            git commit -m "chore: update RSS feeds [skip ci]" &&
            git push
          )
